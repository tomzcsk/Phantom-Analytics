# Phantom Analytics — Nginx Reverse Proxy Configuration
#
# Routing:
#   /api/*           → api:3001  (Fastify REST + SSE)
#   /api/realtime/*  → api:3001  (SSE — long-lived connections)
#   /                → dashboard:5173 (React SPA)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream definitions ──────────────────────────────────────────────

    upstream api {
        server api:3001;
        keepalive 32;
    }

    upstream dashboard {
        server dashboard:5173;
        keepalive 16;
    }

    # ── Main server block ─────────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── SSE endpoint — long-lived connections ─────────────────────────
        # Must be before the general /api/ block to take priority.
        location /api/realtime/ {
            proxy_pass http://api;
            proxy_http_version 1.1;

            # SSE requires these headers to be stripped/set correctly
            proxy_set_header Connection '';
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # SSE must NOT be buffered — flush every frame immediately
            proxy_buffering off;
            proxy_cache off;

            # Keep SSE connections alive for up to 24 hours
            # (as documented in CLAUDE.md SSE Connection Limit)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # CORS headers for SSE
            add_header 'Cache-Control' 'no-cache';
            add_header 'X-Accel-Buffering' 'no';
        }

        # ── API routes ────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # Standard timeouts for REST calls
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 5s;

            # Forward original IP for rate limiting
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (direct) ─────────────────────────────────────────
        location = /health {
            proxy_pass http://api/health;
            proxy_read_timeout 5s;
        }

        # ── React SPA (dashboard) ─────────────────────────────────────────
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # SPA fallback — serve index.html for all client-side routes
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://dashboard;
        }
    }
}
